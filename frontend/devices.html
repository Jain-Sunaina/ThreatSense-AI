<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreatSense AI — Devices</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark ts-navbar px-4 py-2">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <i class="bi bi-shield-fill-exclamation fs-4 text-cyan"></i>
      <span class="ts-logo-text fw-bold fs-5">ThreatSense <span class="text-cyan">AI</span></span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item"><a class="nav-link"        href="index.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active"  href="devices.html"><i class="bi bi-cpu me-1"></i>Devices</a></li>
        <li class="nav-item"><a class="nav-link"         href="alerts.html"><i class="bi bi-bell me-1"></i>Alerts</a></li>
        <li class="nav-item"><a class="nav-link"         href="settings.html"><i class="bi bi-gear me-1"></i>Settings</a></li>
      </ul>
      <div class="d-flex align-items-center ms-lg-4 mt-3 mt-lg-0 gap-2">
        <span class="ts-status-dot"></span>
        <span class="text-muted small">System Online</span>
        <img src="https://ui-avatars.com/api/?name=Admin&background=0d6efd&color=fff&size=32&rounded=true"
             alt="Admin" class="rounded-circle ms-2" width="32" height="32" />
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 py-4">

    <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
      <div>
        <h4 class="mb-0 fw-semibold"><i class="bi bi-cpu text-cyan me-2"></i>Registered Devices</h4>
        <small class="text-muted" id="live-time">Loading...</small>
      </div>
      <button class="btn btn-outline-cyan btn-sm px-3" onclick="loadDevices()">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>

    <div class="row g-3" id="device-cards">
      <div class="col-12 text-center text-muted py-5">
        <i class="bi bi-cpu fs-1 d-block mb-2 opacity-25"></i>Loading devices...
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    'use strict';

    function fmtTime(iso) {
      if (!iso) return 'Never';
      return new Date(iso).toLocaleString();
    }
    function statusClass(s) {
      return { healthy:'ts-badge-healthy', warning:'ts-badge-warning', danger:'ts-badge-danger', offline:'ts-badge-offline' }[s] || 'ts-badge-healthy';
    }
    function statusIcon(s) {
      return { healthy:'bi-check-circle-fill', warning:'bi-exclamation-triangle-fill', danger:'bi-x-circle-fill', offline:'bi-dash-circle-fill' }[s] || 'bi-check-circle-fill';
    }
    function predClass(p) {
      return p === 'Anomaly' ? 'text-danger' : p === 'Normal' ? 'text-success' : 'text-muted';
    }

    async function loadDevices() {
      const container = document.getElementById('device-cards');
      container.innerHTML = `<div class="col-12 text-center text-muted py-5">
        <i class="bi bi-cpu fs-1 d-block mb-2 opacity-25"></i>Loading...</div>`;

      const devices = await API.devices();
      if (!devices || devices.length === 0) {
        container.innerHTML = `<div class="col-12 text-center text-muted py-5">No devices found.</div>`;
        return;
      }

      container.innerHTML = devices.map(d => `
        <div class="col-12 col-md-6 col-xl-4">
          <div class="ts-card p-3 h-100">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <p class="ts-card-label mb-0">${d.device_type}</p>
                <h6 class="fw-bold text-cyan mb-0">${d.device_id}</h6>
                <small class="text-muted">${d.name}</small>
              </div>
              <span class="ts-badge ${statusClass(d.status)}">
                <i class="bi ${statusIcon(d.status)}"></i>
                ${d.status.charAt(0).toUpperCase() + d.status.slice(1)}
              </span>
            </div>
            <div class="row g-2 text-center mb-3">
              <div class="col-4">
                <div class="ts-mini-stat">
                  <small class="text-muted d-block">Temp</small>
                  <span class="fw-semibold">${d.temperature != null ? d.temperature + '°C' : '—'}</span>
                </div>
              </div>
              <div class="col-4">
                <div class="ts-mini-stat">
                  <small class="text-muted d-block">Humidity</small>
                  <span class="fw-semibold">${d.humidity != null ? d.humidity + '%' : '—'}</span>
                </div>
              </div>
              <div class="col-4">
                <div class="ts-mini-stat">
                  <small class="text-muted d-block">AQI</small>
                  <span class="fw-semibold">${d.air_quality != null ? d.air_quality : '—'}</span>
                </div>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <small class="text-muted"><i class="bi bi-clock me-1"></i>${fmtTime(d.last_seen)}</small>
              <span class="fw-semibold ${predClass(d.prediction)}" style="font-size:.8rem;">
                ${d.prediction ? (d.prediction === 'Anomaly' ? '🔴 Anomaly' : '🟢 Normal') : '—'}
              </span>
            </div>
          </div>
        </div>`).join('');
    }

    function updateClock() {
      const el = document.getElementById('live-time');
      if (el) el.textContent = new Date().toLocaleString();
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateClock();
      setInterval(updateClock, 1000);
      loadDevices();
      setInterval(loadDevices, 30000);
    });
  </script>
</body>
</html>
